<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HaresvaMi — Импорт на меню с AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
:root {
  --bg: #F6F1E8; --bg-2: #EDE4D3; --paper: #FDF9F1;
  --ink: #1A1512; --ink-2: #4A3F35; --ink-mute: #8A7A68;
  --rule: #D9CEBB; --rule-soft: #E6DDC9;
  --accent: #C24D2C; --accent-2: #E89A3C; --plum: #5B2A2A;
  --good: #4E6B3C; --warn: #B47A1F;
  --f-display: 'Instrument Serif', Georgia, serif;
  --f-ui: 'Inter', system-ui, sans-serif;
  --f-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* Category palette — matches user's screenshot */
  --c-alc-bg: #E5D7C5;   --c-alc-dot: #5B3F2B;
  --c-garn-bg: #F4E1C5;  --c-garn-dot: #C77A28;
  --c-napit-bg: #E3D9D6; --c-napit-dot: #7C5A6E;
  --c-osn-bg: #EBD9CF;   --c-osn-dot: #B23E1F;
  --c-pech-bg: #D5DDC8;  --c-pech-dot: #4E6B3C;
  --c-salat-bg: #F1DDC4; --c-salat-dot: #C77A28;
  --c-skar-bg: #F0D2B6;  --c-skar-dot: #D17A2A;
  --c-pred-bg: #DECBB3;  --c-pred-dot: #8B6235;
  --c-desert-bg: #ECD6D0; --c-desert-dot: #9B4A3F;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: var(--f-ui); font-size:14.5px; line-height:1.5; -webkit-font-smoothing:antialiased; }
button { font-family: inherit; cursor: pointer; background: transparent; border: none; color: inherit; padding: 0; }
a { color: inherit; text-decoration: none; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
svg { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

/* ===== Preview tabs ===== */
.tabs-bar { position: sticky; top: 0; z-index: 80; background: var(--bg); border-bottom: 1px solid var(--rule); padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.tabs-bar .label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); }
.tabs-bar .btns { display: flex; gap: 6px; flex-wrap: wrap; }
.tabs-bar button { padding: 8px 14px; border-radius: 999px; font-size: 12px; color: var(--ink-2); border: 1px solid var(--rule); font-family: var(--f-mono); }
.tabs-bar button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.tabs-bar .spacer { flex: 1; }
.tabs-bar .back { font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); }

/* ===== Shell ===== */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 240px; flex-shrink: 0; background: var(--bg); border-right: 1px solid var(--rule); padding: 20px 16px 16px; display: flex; flex-direction: column; position: sticky; top: 51px; height: calc(100vh - 51px); }
.sb-brand { display: flex; align-items: center; gap: 8px; color: var(--ink-mute); font-size: 13px; padding: 0 8px; }
.sb-mark { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: var(--paper); display: grid; place-items: center; font-family: var(--f-display); font-style: italic; font-size: 13px; line-height: 1; }
.sb-rest { font-family: var(--f-display); font-size: 22px; margin-top: 14px; line-height: 1.05; letter-spacing: -0.01em; padding: 0 8px; }
.sb-chip { display: inline-block; margin: 8px 8px 0; padding: 3px 8px; border: 1px solid var(--rule); border-radius: 999px; font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.08em; text-transform: uppercase; }
.sep { height: 1px; background: var(--rule); margin: 20px 0 0; }
.sb-group { padding-top: 20px; }
.sb-label { font-family: var(--f-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-mute); padding: 0 8px 8px; }
.sb-nav { display: flex; flex-direction: column; gap: 2px; }
.sb-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; font-size: 14px; color: var(--ink-2); }
.sb-item.on { background: var(--paper); color: var(--ink); font-weight: 500; }
.sb-item .ic { width: 16px; height: 16px; opacity: .75; display: inline-grid; place-items: center; }
.sb-item.on .ic { color: var(--accent); opacity: 1; }
.sb-bottom { margin-top: auto; padding: 20px 8px 0; display: flex; flex-direction: column; gap: 16px; }
.av-row { display: flex; align-items: center; gap: 10px; }
.av { width: 36px; height: 36px; border-radius: 50%; background: var(--plum); color: var(--paper); display: grid; place-items: center; font-family: var(--f-display); font-style: italic; font-size: 18px; line-height: 1; }
.av-row .who { font-size: 13px; }
.av-row .who b { display: block; color: var(--ink); font-weight: 500; }
.av-row .who span { font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
.lang { display: flex; gap: 2px; font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }
.lang button { padding: 2px 6px; color: inherit; }
.lang button.on { color: var(--ink); border-bottom: 1px solid var(--accent); }

/* ===== Main ===== */
.main { flex: 1; min-width: 0; }
.topbar { position: sticky; top: 51px; z-index: 20; border-bottom: 1px solid var(--rule); background: color-mix(in oklab, var(--bg) 85%, transparent); backdrop-filter: blur(8px); }
.topbar-inner { padding: 22px 48px; display: flex; align-items: center; gap: 12px; }
.greet { flex: 1; font-family: var(--f-display); font-size: 30px; line-height: 1.05; letter-spacing: -0.02em; }
.greet em { font-style: italic; color: var(--accent); }
.prof { display: inline-grid; place-items: center; height: 36px; border-radius: 8px; padding: 4px 12px 4px 4px; gap: 8px; }
.content { padding: 36px 48px 80px; }

/* ===== Step header (used by step 2, 3, 4) ===== */
.eyebrow { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }
.intro h2 { font-family: var(--f-display); font-size: 44px; line-height: 1.02; letter-spacing: -0.02em; margin: 8px 0 14px; font-weight: 400; }
.intro h2 em { font-style: italic; color: var(--accent); }
.intro p { margin: 0; color: var(--ink-mute); font-size: 15.5px; max-width: 620px; line-height: 1.55; }

/* Step indicator */
.stepper {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px; border-radius: 999px;
  background: var(--paper); border: 1px solid var(--rule);
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.stepper .s { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-mute); }
.stepper .s.done { color: var(--good); }
.stepper .s.on { color: var(--accent); }
.stepper .s .num {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--rule);
  display: grid; place-items: center;
  font-size: 10px; font-weight: 600;
}
.stepper .s.done .num { background: var(--good); border-color: var(--good); color: var(--paper); }
.stepper .s.on .num { background: var(--accent); border-color: var(--accent); color: var(--paper); }
.stepper .sep { width: 18px; height: 1px; background: var(--rule); }

/* ===========================================================
   STEP 1 — UPLOAD
   =========================================================== */
.upload-grid {
  margin-top: 36px;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 28px;
  align-items: start;
}

.dropzone {
  background: var(--paper);
  border: 2px dashed color-mix(in oklab, var(--accent) 30%, var(--rule));
  border-radius: 16px;
  padding: 40px 36px;
  position: relative;
  min-height: 360px;
  display: flex; flex-direction: column;
}
.dropzone.is-dragging {
  border-color: var(--accent);
  background: color-mix(in oklab, var(--accent) 6%, var(--paper));
}
.dz-top {
  display: flex; align-items: flex-start; gap: 18px;
  margin-bottom: 20px;
}
.dz-icon {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(140deg, var(--accent), #D17A2A);
  color: var(--paper);
  display: grid; place-items: center;
  box-shadow: 0 12px 28px -10px rgba(194,77,44,0.5);
  flex-shrink: 0;
}
.dz-icon svg { width: 24px; height: 24px; }
.dz-top h3 {
  font-family: var(--f-display); font-size: 30px;
  margin: 0 0 4px; font-weight: 400; letter-spacing: -0.01em;
}
.dz-top h3 em { font-style: italic; color: var(--accent); }
.dz-top p { margin: 0; font-size: 14px; color: var(--ink-mute); max-width: 460px; }

.dz-cta {
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px dashed var(--rule);
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.dz-cta .lbl { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); }
.dz-cta .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 18px; border-radius: 9px;
  font-size: 14px; font-weight: 500;
}
.dz-cta .btn-pick { background: var(--ink); color: var(--paper); }
.dz-cta .btn-pick:hover { background: var(--accent); }
.dz-cta .btn-pick svg { width: 14px; height: 14px; }
.dz-cta .btn-cam {
  background: transparent; border: 1px solid var(--rule); color: var(--ink-2);
  padding: 10px 16px;
}
.dz-cta .btn-cam:hover { border-color: var(--ink); color: var(--ink); }
.dz-formats { font-family: var(--f-mono); font-size: 10.5px; color: var(--ink-mute); letter-spacing: 0.08em; text-transform: uppercase; margin-left: auto; }

/* Selected files list — appears below CTA once user picks */
.dz-files {
  margin-top: 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.dz-file {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 10px;
  position: relative;
  display: flex; flex-direction: column; gap: 8px;
}
.dz-file .thumb {
  aspect-ratio: 4/5; border-radius: 6px; overflow: hidden;
  background: linear-gradient(135deg, #C9BDA8, #B9A88E);
  position: relative;
  display: grid; place-items: center;
  color: rgba(255,255,255,0.7);
}
.dz-file .thumb.pdf { background: linear-gradient(135deg, #5B2A2A, #8B3F3F); }
.dz-file .thumb.pdf::after {
  content: 'PDF'; font-family: var(--f-mono); font-size: 22px;
  font-weight: 600; color: var(--paper); letter-spacing: 0.06em;
}
.dz-file .thumb.img1 { background: linear-gradient(160deg, #D4C5A8 0%, #9B7E5C 50%, #5B3F2B 100%); }
.dz-file .thumb.img2 { background: linear-gradient(160deg, #E8D4B5 0%, #B89764 50%, #7C5430 100%); }
.dz-file .thumb.img3 { background: linear-gradient(160deg, #C8B89A 0%, #8C7456 50%, #4A3525 100%); }
.dz-file .thumb svg { width: 24px; height: 24px; opacity: 0.85; }
.dz-file .nm { font-size: 11.5px; color: var(--ink-2); line-height: 1.3; word-break: break-all; }
.dz-file .nm b { display: block; color: var(--ink); font-weight: 500; font-size: 12px; }
.dz-file .nm .meta { font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
.dz-file .rm {
  position: absolute; top: 6px; right: 6px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(26,21,18,0.65); color: var(--paper);
  display: grid; place-items: center;
  opacity: 0; transition: opacity .15s;
}
.dz-file:hover .rm { opacity: 1; }
.dz-file .rm svg { width: 10px; height: 10px; }
.dz-file.add {
  border-style: dashed; border-color: var(--rule);
  align-items: center; justify-content: center;
  color: var(--ink-mute); font-family: var(--f-mono);
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; aspect-ratio: auto;
  padding: 0; min-height: 100%;
}
.dz-file.add:hover { color: var(--accent); border-color: var(--accent); background: color-mix(in oklab, var(--accent) 4%, var(--bg)); }

.dz-actions {
  margin-top: 24px; padding-top: 20px;
  border-top: 1px solid var(--rule);
  display: flex; align-items: center; gap: 14px;
}
.dz-actions .summary { flex: 1; font-size: 13px; color: var(--ink-2); }
.dz-actions .summary b { color: var(--ink); font-weight: 500; }
.dz-actions .summary span { color: var(--ink-mute); font-family: var(--f-mono); font-size: 11px; }
.dz-actions .btn-start {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 13px 22px; border-radius: 10px;
  background: var(--accent); color: var(--paper);
  font-size: 14.5px; font-weight: 500;
  box-shadow: 0 10px 24px -10px rgba(194,77,44,0.55);
}
.dz-actions .btn-start:hover { background: var(--plum); }
.dz-actions .btn-start svg { width: 15px; height: 15px; }

/* Side rail: tips + manual fallback */
.up-aside {
  display: flex; flex-direction: column; gap: 16px;
  position: sticky; top: 130px;
}
.tip-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 22px 24px;
}
.tip-card .lbl { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 10px; }
.tip-card h4 { font-family: var(--f-display); font-size: 22px; margin: 0 0 6px; font-weight: 400; letter-spacing: -0.01em; }
.tip-card h4 em { font-style: italic; color: var(--accent); }
.tip-card p { margin: 0; font-size: 13px; color: var(--ink-2); line-height: 1.55; }
.tips-list { list-style: none; margin: 14px 0 0; padding: 0; }
.tips-list li {
  display: flex; gap: 12px; padding: 10px 0;
  border-top: 1px solid var(--rule-soft);
  font-size: 13px; color: var(--ink-2); line-height: 1.5;
}
.tips-list li:first-child { border-top: none; padding-top: 0; }
.tips-list li b { color: var(--ink); font-weight: 500; }
.tips-list li .ic {
  width: 24px; height: 24px; border-radius: 6px;
  background: color-mix(in oklab, var(--accent) 8%, var(--bg));
  color: var(--accent);
  display: grid; place-items: center; flex-shrink: 0;
}
.tips-list li .ic svg { width: 13px; height: 13px; }

.manual-fallback {
  border: 1px dashed var(--rule);
  border-radius: 12px;
  padding: 16px 20px;
  background: transparent;
  display: flex; align-items: center; gap: 14px;
}
.manual-fallback .t { flex: 1; font-size: 13px; color: var(--ink-2); }
.manual-fallback .t b { color: var(--ink); display: block; font-weight: 500; }
.manual-fallback a { font-family: var(--f-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute); }
.manual-fallback a:hover { color: var(--accent); }

/* ===========================================================
   STEP 2 — PROCESSING
   =========================================================== */
.proc-wrap {
  margin-top: 32px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 28px;
}
.proc-main {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 16px;
  padding: 36px 36px 28px;
  position: relative;
  overflow: hidden;
}
.proc-main::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg,
    var(--accent) 0%, var(--accent) 64%,
    var(--rule) 64%, var(--rule) 100%);
}
.proc-main .stripe {
  position: absolute; top: 0; left: 0; height: 3px; width: 64%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: shimmer 2.4s ease-in-out infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.proc-head { display: flex; align-items: flex-start; gap: 18px; }
.proc-pulse {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(140deg, var(--accent), #D17A2A);
  color: var(--paper); display: grid; place-items: center;
  flex-shrink: 0;
  box-shadow: 0 0 0 6px color-mix(in oklab, var(--accent) 12%, transparent);
  animation: glow 1.8s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { box-shadow: 0 0 0 6px color-mix(in oklab, var(--accent) 12%, transparent); }
  50% { box-shadow: 0 0 0 14px color-mix(in oklab, var(--accent) 4%, transparent); }
}
.proc-pulse svg { width: 22px; height: 22px; }
.proc-head h3 { font-family: var(--f-display); font-size: 30px; margin: 0 0 4px; font-weight: 400; letter-spacing: -0.01em; }
.proc-head h3 em { font-style: italic; color: var(--accent); }
.proc-head p { margin: 0; font-size: 14px; color: var(--ink-mute); max-width: 480px; line-height: 1.55; }

.proc-progress {
  margin-top: 28px;
  display: flex; align-items: center; gap: 14px;
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.proc-progress .bar { flex: 1; height: 5px; background: var(--rule); border-radius: 3px; overflow: hidden; }
.proc-progress .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 3px; transition: width .4s; }
.proc-progress .pct { color: var(--ink); font-weight: 600; font-size: 12.5px; }
.proc-progress .eta { font-style: normal; }

.proc-log {
  margin-top: 28px;
  display: flex; flex-direction: column; gap: 2px;
  font-family: var(--f-mono); font-size: 12px;
}
.proc-log .line { display: flex; align-items: center; gap: 12px; padding: 7px 0; color: var(--ink-mute); }
.proc-log .line .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rule); flex-shrink: 0; }
.proc-log .line.done { color: var(--ink-2); }
.proc-log .line.done .dot { background: var(--good); }
.proc-log .line.on { color: var(--ink); }
.proc-log .line.on .dot { background: var(--accent); animation: dotPulse 1.2s ease-in-out infinite; }
@keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.proc-log .line .ct { margin-left: auto; color: var(--ink-mute); font-size: 11px; }

/* Right rail — files being processed */
.proc-files {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 18px 20px;
}
.proc-files .h { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 14px; }
.proc-files .f-list { list-style: none; margin: 0; padding: 0; }
.proc-files .fitem {
  display: grid; grid-template-columns: 36px 1fr auto;
  align-items: center; gap: 12px;
  padding: 10px 0; border-top: 1px solid var(--rule-soft);
  font-size: 13px;
}
.proc-files .fitem:first-child { border-top: none; }
.proc-files .fitem .mini {
  width: 36px; height: 44px; border-radius: 5px;
  background: linear-gradient(135deg, #C9BDA8, #B9A88E);
  flex-shrink: 0;
}
.proc-files .fitem .mini.pdf { background: linear-gradient(135deg, #5B2A2A, #8B3F3F); }
.proc-files .fitem .mini.img1 { background: linear-gradient(160deg, #D4C5A8, #5B3F2B); }
.proc-files .fitem .mini.img2 { background: linear-gradient(160deg, #E8D4B5, #7C5430); }
.proc-files .fitem .mini.img3 { background: linear-gradient(160deg, #C8B89A, #4A3525); }
.proc-files .fitem .nm b { display: block; color: var(--ink); font-weight: 500; }
.proc-files .fitem .nm span { font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.05em; }
.proc-files .fitem .st { font-family: var(--f-mono); font-size: 10.5px; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.06em; text-transform: uppercase; }
.proc-files .fitem .st.done { background: color-mix(in oklab, var(--good) 14%, transparent); color: var(--good); }
.proc-files .fitem .st.on { background: color-mix(in oklab, var(--accent) 14%, transparent); color: var(--accent); }
.proc-files .fitem .st.queue { color: var(--ink-mute); border: 1px solid var(--rule); }

.proc-stats {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--rule);
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.proc-stats .st { font-size: 13px; color: var(--ink-2); }

function dishHtml(d) {
  const confIcon = d.conf === 'high'
    ? `<span class="conf high">${I.check}</span>`
    : d.conf === 'mid'
      ? `<span class="conf mid"></span>`
      : `<span class="conf low"></span>`;
  const warnNote = d.warn ? `
    <div class="warn-note">
      ${I.warn} ${d.warn}
      <button class="chip-fix">поправи</button>
      <span class="source">${I.src} ${d.src}</span>
    </div>` : '';
  return `
  <div class="dish ${d.warn?'warn':''}">
    ${confIcon}
    <input class="name-input" value="${d.n}">
    <div class="price-wrap">
      <input class="price-input" value="${d.p}" placeholder="—">
      <span class="cur">лв</span>
    </div>
    <button class="more">${I.dots}</button>
    ${warnNote}
  </div>`;
}

function catHtml(cat) {
  const warnCount = cat.items.filter(i => i.warn).length;
  return `
  <div class="cat-acc ${cat.key} ${cat.open?'open':''}">
    <div class="cat-h" onclick="this.parentElement.classList.toggle('open')">
      <span class="caret">${I.chev}</span>
      <span class="cat-dot"></span>
      <h3 class="cat-name">${cat.name}</h3>
      <div class="cat-meta">
        <span>${cat.items.length} ястия</span>
        ${warnCount > 0 ? `<span class="warn-pill">${warnCount} за проверка</span>` : ''}
      </div>
    </div>
    <div class="cat-body">
      ${cat.items.map(dishHtml).join('')}
      <button class="add-row">${I.plus} добави ястие в ${cat.name.toLowerCase()}</button>
    </div>
  </div>`;
}

function render(which) {
  document.getElementById('stage').innerHTML = pageHtml(which);
  document.querySelectorAll('#tabs button').forEach(x => x.classList.toggle('on', x.dataset.state === which));
  window.scrollTo({ top: 0 });
}

document.querySelectorAll('#tabs button').forEach(b => {
  b.addEventListener('click', () => render(b.dataset.state));
});
