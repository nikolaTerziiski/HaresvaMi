<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HaresvaMi — Меню (редактор)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root {
  --bg: #F6F1E8; --bg-2: #EDE4D3; --paper: #FDF9F1;
  --ink: #1A1512; --ink-2: #4A3F35; --ink-mute: #8A7A68;
  --rule: #D9CEBB; --rule-soft: #E6DDCB;
  --accent: #C24D2C; --accent-soft: #EFD6C9; --accent-2: #E89A3C; --plum: #5B2A2A;
  --ok: #3F6B4E;
  --f-display: 'Instrument Serif', Georgia, serif;
  --f-ui: 'Inter', system-ui, sans-serif;
  --f-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: var(--f-ui); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
button { font-family: inherit; cursor: pointer; background: transparent; border: none; color: inherit; padding: 0; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
svg { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

/* preview tabs bar */
.tabs-bar {
  position: sticky; top: 0; z-index: 120;
  background: var(--bg); border-bottom: 1px solid var(--rule);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.tabs-bar .label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); }
.tabs-bar .btns { display: flex; gap: 6px; }
.tabs-bar .btns button {
  padding: 7px 12px; border-radius: 999px;
  font-size: 11px; color: var(--ink-2);
  border: 1px solid var(--rule); font-family: var(--f-mono);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.tabs-bar .btns button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.tabs-bar .spacer { flex: 1; }
.tabs-bar .back { font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); }

/* shell */
.shell { display: flex; min-height: calc(100vh - 47px); }
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--bg); border-right: 1px solid var(--rule);
  padding: 20px 16px 16px; display: flex; flex-direction: column;
  position: sticky; top: 47px; height: calc(100vh - 47px);
}
.sb-brand { display: flex; align-items: center; gap: 8px; color: var(--ink-mute); font-size: 13px; padding: 0 8px; }
.sb-mark { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: var(--paper); display: grid; place-items: center; font-family: var(--f-display); font-style: italic; font-size: 13px; line-height: 1; }
.sb-rest { font-family: var(--f-display); font-size: 22px; margin-top: 14px; line-height: 1.05; letter-spacing: -0.01em; padding: 0 8px; }
.sb-chip { display: inline-block; margin: 8px 8px 0; padding: 3px 8px; border: 1px solid var(--rule); border-radius: 999px; font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.08em; text-transform: uppercase; }
.sep { height: 1px; background: var(--rule); margin: 20px 0 0; }
.sb-group { padding-top: 20px; }
.sb-label { font-family: var(--f-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-mute); padding: 0 8px 8px; }
.sb-nav { display: flex; flex-direction: column; gap: 2px; }
.sb-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; font-size: 14px; color: var(--ink-2); cursor: pointer; }
.sb-item:hover { background: color-mix(in oklab, var(--paper) 60%, transparent); color: var(--ink); }
.sb-item.on { background: var(--paper); color: var(--ink); font-weight: 500; }
.sb-item .ic { width: 16px; height: 16px; opacity: .75; display: inline-grid; place-items: center; }
.sb-item.on .ic { color: var(--accent); opacity: 1; }
.sb-bottom { margin-top: auto; padding: 20px 8px 0; display: flex; flex-direction: column; gap: 16px; }
.lang { display: flex; gap: 2px; font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }
.lang button { padding: 2px 6px; }
.lang button.on { color: var(--ink); border-bottom: 1px solid var(--accent); }
.av-row { display: flex; align-items: center; gap: 10px; }
.av { width: 36px; height: 36px; border-radius: 50%; background: var(--plum); color: var(--paper); display: grid; place-items: center; font-family: var(--f-display); font-style: italic; font-size: 18px; line-height: 1; }
.av-row .who { font-size: 13px; }
.av-row .who b { display: block; color: var(--ink); font-weight: 500; }
.av-row .who span { font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }

/* main */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  position: sticky; top: 47px; z-index: 40;
  border-bottom: 1px solid var(--rule);
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: blur(8px);
}
.topbar-inner { padding: 14px 36px; display: flex; align-items: center; gap: 14px; }
.breadcrumbs { font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; }
.breadcrumbs b { color: var(--ink); font-weight: 500; }
.topbar-inner .spacer { flex: 1; }
.topbar-inner .actions { display: flex; gap: 8px; align-items: center; }

.content { padding: 0 0 80px; flex: 1; }

/* page header */
.page-head {
  padding: 36px 36px 24px;
  display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: end;
  border-bottom: 1px solid var(--rule-soft);
}
.page-head .kicker { font-family: var(--f-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-mute); }
.page-head h1 { font-family: var(--f-display); font-size: 44px; line-height: 1.02; letter-spacing: -0.02em; margin: 8px 0 8px; font-weight: 400; }
.page-head h1 em { font-style: italic; color: var(--accent); }
.page-head .lead { margin: 0; color: var(--ink-2); max-width: 560px; font-size: 15px; }
.stat-block {
  display: flex; gap: 28px; align-items: flex-end;
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.stat-block .n { font-family: var(--f-display); font-style: italic; font-size: 40px; color: var(--ink); display: block; line-height: 0.9; letter-spacing: -0.02em; text-transform: none; }
.stat-block .n em { color: var(--accent); }

/* toolbar (sticky filter row) */
.toolbar {
  position: sticky; top: 109px; z-index: 30;
  background: color-mix(in oklab, var(--bg) 92%, transparent);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--rule);
  padding: 10px 36px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.search {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border: 1px solid var(--rule);
  padding: 7px 12px; border-radius: 8px; width: 280px;
  color: var(--ink-mute);
}
.search input { border: none; outline: none; background: transparent; flex: 1; font-size: 13px; color: var(--ink); }
.search svg { width: 14px; height: 14px; }

.chips { display: flex; gap: 4px; margin-left: 4px; flex-wrap: wrap; }
.chip {
  padding: 6px 12px; border-radius: 999px; font-size: 12px;
  border: 1px solid var(--rule); background: var(--paper);
  color: var(--ink-2); display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer;
}
.chip:hover { border-color: var(--ink-mute); color: var(--ink); }
.chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.chip .count { font-family: var(--f-mono); font-size: 10px; opacity: .7; }
.chip.on .count { opacity: 1; }

.toolbar .spacer { flex: 1; }

.tb-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-radius: 8px;
  font-size: 13px; color: var(--ink-2);
  border: 1px solid var(--rule); background: var(--paper);
}
.tb-btn:hover { border-color: var(--ink); color: var(--ink); }
.tb-btn svg { width: 14px; height: 14px; }

.kbd {
  font-family: var(--f-mono); font-size: 10px;
  padding: 2px 5px; border-radius: 4px;
  background: var(--bg-2); color: var(--ink-mute);
  border: 1px solid var(--rule);
}

/* buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: background .15s, color .15s, border-color .15s; cursor: pointer; }
.btn svg { width: 14px; height: 14px; }
.btn-primary { background: var(--accent); color: var(--paper); box-shadow: 0 6px 20px -8px rgba(194,77,44,0.6); }
.btn-primary:hover { background: var(--plum); }
.btn-primary:disabled { background: var(--rule); color: var(--ink-mute); box-shadow: none; cursor: not-allowed; }
.btn-ghost { color: var(--ink-2); }
.btn-ghost:hover { color: var(--ink); }
.btn-outline { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
.btn-outline:hover { background: var(--ink); color: var(--paper); }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-wrap {
  padding: 64px 36px;
  max-width: 960px; margin: 0 auto;
}
.empty-grid {
  margin-top: 28px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
.add-card {
  position: relative;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 32px 28px 28px;
  display: flex; flex-direction: column; gap: 14px;
  cursor: pointer;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  overflow: hidden;
}
.add-card:hover { border-color: var(--ink); transform: translateY(-2px); box-shadow: 0 30px 50px -30px rgba(26,21,18,0.25); }
.add-card.featured { background: linear-gradient(160deg, var(--paper) 0%, var(--bg-2) 100%); }
.add-card .ribbon {
  position: absolute; top: 16px; right: 16px;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 999px;
  background: var(--accent); color: var(--paper);
  font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
}
.add-card .glyph {
  width: 44px; height: 44px; border-radius: 12px;
  display: grid; place-items: center;
  background: var(--bg); border: 1px solid var(--rule);
  color: var(--accent);
}
.add-card.featured .glyph { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.add-card h3 { font-family: var(--f-display); font-size: 28px; line-height: 1.1; letter-spacing: -0.01em; margin: 0; font-weight: 400; }
.add-card h3 em { font-style: italic; color: var(--accent); }
.add-card p { margin: 0; font-size: 13px; color: var(--ink-2); line-height: 1.55; max-width: 320px; }
.add-card .meta { display: flex; gap: 14px; margin-top: auto; padding-top: 12px; border-top: 1px dashed var(--rule); font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
.add-card .meta span { display: inline-flex; align-items: center; gap: 4px; }
.add-card .go {
  align-self: flex-start; margin-top: 4px;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
}
.add-card.featured .go { background: var(--accent); color: var(--paper); }
.add-card:not(.featured) .go { background: var(--ink); color: var(--paper); }

.ai-demo {
  margin-top: 8px;
  border: 1px dashed var(--rule); border-radius: 8px;
  background: var(--paper);
  padding: 12px 14px;
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-2);
  display: flex; flex-direction: column; gap: 4px;
  line-height: 1.4;
}
.ai-demo .arr { color: var(--accent); }
.ai-demo .out { color: var(--ink); }

.empty-help {
  margin-top: 32px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
  padding-top: 24px; border-top: 1px solid var(--rule-soft);
}
.empty-help .hc { font-size: 13px; color: var(--ink-2); line-height: 1.55; }
.empty-help .hc b { display: block; color: var(--ink); font-weight: 500; font-family: var(--f-display); font-size: 18px; letter-spacing: -0.01em; margin-bottom: 4px; }

/* ============================================================
   TABLE / EDITOR STATE
   ============================================================ */
.editor {
  padding: 20px 36px 0;
}
.category-block + .category-block { margin-top: 24px; }
.category-head {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 0 8px;
  position: sticky; top: 162px; z-index: 10;
  background: color-mix(in oklab, var(--bg) 96%, transparent);
  backdrop-filter: blur(4px);
}
.category-head h3 {
  font-family: var(--f-display); font-size: 22px; font-weight: 400;
  margin: 0; letter-spacing: -0.01em;
}
.category-head .tag {
  font-family: var(--f-mono); font-size: 10px;
  color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em;
}
.category-head .spacer { flex: 1; }
.category-head .collapse {
  font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 4px 8px; border-radius: 6px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
}
.category-head .collapse:hover { background: var(--paper); color: var(--ink); }

/* table */
.table {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
}
.thead, .trow {
  display: grid;
  grid-template-columns: 36px 3fr 1.4fr 1fr 100px 52px;
  align-items: center;
  gap: 0;
}
.thead {
  padding: 10px 16px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
  font-family: var(--f-mono); font-size: 10px;
  color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em;
}
.thead .th { padding: 0 8px; }
.thead .th.num { text-align: right; }

.trow {
  padding: 4px 16px;
  border-bottom: 1px solid var(--rule-soft);
  transition: background .12s;
}
.trow:last-child { border-bottom: none; }
.trow:hover { background: color-mix(in oklab, var(--accent) 4%, var(--paper)); }
.trow.new { animation: slideIn .25s ease-out; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.trow .cell { padding: 0 8px; }
.drag {
  color: var(--ink-mute); cursor: grab; display: grid; place-items: center;
  height: 36px; opacity: 0; transition: opacity .12s;
}
.trow:hover .drag { opacity: 1; }
.drag svg { width: 14px; height: 14px; }

.cell-input {
  width: 100%; border: 1px solid transparent; background: transparent;
  padding: 8px 10px; border-radius: 6px; font-size: 14px;
  outline: none; transition: background .12s, border-color .12s;
  color: var(--ink);
}
.cell-input:hover { background: var(--bg); }
.cell-input:focus { background: var(--bg); border-color: var(--accent); }
.cell-input.name { font-weight: 500; }
.cell-input.num { text-align: right; font-family: var(--f-mono); padding-right: 14px; }

.cell-cat {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 8px; border-radius: 999px;
  border: 1px solid var(--rule); background: transparent;
  font-size: 12px; color: var(--ink-2); cursor: pointer;
  max-width: 100%;
}
.cell-cat:hover { border-color: var(--ink-mute); background: var(--bg); }
.cell-cat .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cell-cat svg { width: 10px; height: 10px; color: var(--ink-mute); }

.aliases {
  display: flex; gap: 4px; padding: 0 8px; align-items: center; flex-wrap: wrap;
  min-height: 36px;
}
.alias {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--f-mono); font-size: 10px;
  padding: 2px 7px; border-radius: 4px;
  background: var(--bg-2); color: var(--ink-2);
}
.alias.add {
  background: transparent; border: 1px dashed var(--rule); color: var(--ink-mute);
  cursor: pointer; opacity: 0; transition: opacity .12s;
}
.trow:hover .alias.add { opacity: 1; }
.alias.add:hover { color: var(--ink); border-color: var(--ink); }

.num-box {
  display: flex; align-items: center; gap: 2px; justify-content: flex-end;
  padding-right: 0;
}
.num-box .currency { font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); }

.rowmenu {
  display: grid; place-items: center; width: 36px; height: 36px;
  border-radius: 6px; color: var(--ink-mute); cursor: pointer; opacity: 0;
  transition: opacity .12s, background .12s, color .12s;
}
.trow:hover .rowmenu { opacity: 1; }
.rowmenu:hover { background: var(--bg-2); color: var(--accent); }
.rowmenu svg { width: 14px; height: 14px; }

/* add row footer */
.tadd {
  padding: 10px 16px;
  border-top: 1px solid var(--rule);
  display: flex; align-items: center; gap: 10px;
  background: var(--bg);
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute);
}
.tadd .add-inline {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 6px; cursor: pointer;
  color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px;
}
.tadd .add-inline:hover { background: var(--paper); color: var(--accent); }
.tadd .add-inline svg { width: 12px; height: 12px; }
.tadd .spacer { flex: 1; }
.tadd .hint { display: inline-flex; align-items: center; gap: 6px; }

/* inspector rail (optional right rail) */
.layout-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 28px;
  align-items: start;
}
.insp {
  position: sticky; top: 162px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 20px;
}
.insp .ih { font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.insp h4 { font-family: var(--f-display); font-size: 22px; margin: 0 0 4px; font-weight: 400; letter-spacing: -0.01em; }
.insp .who { font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); margin-bottom: 16px; }
.insp .field { margin-bottom: 14px; }
.insp .field label { display: block; font-family: var(--f-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.insp .field .v { font-size: 14px; color: var(--ink); }
.insp .field .v.mono { font-family: var(--f-mono); font-size: 13px; }
.insp .callout {
  background: var(--bg-2); border-radius: 8px; padding: 12px 14px;
  font-size: 12px; color: var(--ink-2); line-height: 1.5;
  margin-top: 14px;
}
.insp .callout b { color: var(--ink); font-weight: 500; }

/* ai import overlay */
.ai-panel {
  margin: 16px 36px 24px;
  background: linear-gradient(160deg, var(--paper) 0%, #F7EDE0 100%);
  border: 1px solid var(--accent-soft);
  border-radius: 14px;
  padding: 22px 26px;
  display: grid; grid-template-columns: auto 1fr auto; gap: 20px; align-items: center;
  box-shadow: 0 20px 50px -30px rgba(194,77,44,0.3);
}
.ai-panel .ai-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--accent); color: var(--paper);
  display: grid; place-items: center;
}
.ai-panel h4 { font-family: var(--f-display); font-size: 24px; font-weight: 400; margin: 0 0 4px; letter-spacing: -0.01em; }
.ai-panel h4 em { font-style: italic; color: var(--accent); }
.ai-panel p { margin: 0; font-size: 13px; color: var(--ink-2); max-width: 520px; }
.ai-panel .prog-row { display: flex; gap: 18px; margin-top: 10px; align-items: center; font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
.ai-panel .pb { flex: 0 0 180px; height: 4px; background: var(--rule); border-radius: 2px; overflow: hidden; }
.ai-panel .pb > i { display: block; height: 100%; width: 62%; background: var(--accent); border-radius: 2px; animation: pbFlow 2.4s ease-in-out infinite; }
@keyframes pbFlow {
  0%, 100% { width: 48%; }
  50% { width: 82%; }
}
.ai-panel .btns { display: flex; gap: 8px; }

/* unsaved changes bar */
.unsaved-bar {
  position: sticky; bottom: 20px; z-index: 60;
  margin: 0 36px 0;
  background: var(--ink); color: var(--paper);
  border-radius: 12px;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 20px 40px -10px rgba(26,21,18,0.4);
}
.unsaved-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-2); flex-shrink: 0; }
.unsaved-bar .msg { font-size: 13px; flex: 1; }
.unsaved-bar .msg b { color: var(--paper); }
.unsaved-bar .msg span { color: color-mix(in oklab, var(--paper) 60%, transparent); }
.unsaved-bar .btn-primary { background: var(--accent); }
.unsaved-bar .btn-ghost { color: color-mix(in oklab, var(--paper) 70%, transparent); padding: 8px 12px; }
.unsaved-bar .btn-ghost:hover { color: var(--paper); }

/* responsive-ish */
@media (max-width: 1100px) {
  .layout-grid { grid-template-columns: 1fr; }
  .insp { position: static; }
}
@media (max-width: 820px) {
  .sidebar { display: none; }

}

<script>

  upload:'<svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 3v12M6 9l6-6 6 6"/><path d="M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>',

  camera:'<svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 8h4l2-3h6l2 3h4v11H3z"/><circle cx="12" cy="13" r="4"/></svg>',

const restaurantName = "Механа Къщата";
const owner = "Иван";

function sidebarHtml() {
  const navWork = [
    { label:"Начало", icon:I.home },

    { label:"Меню", icon:I.fork, on:true },

  const navAcc = [
    { label:"Екип", icon:I.users },

function topbarHtml(title) {
  return `
  <div class="topbar">

        <button class="btn btn-ghost">Предварителен преглед</button>
      </div>
    </div>
  </div>`;
}

// ============================================================

// ============================================================
function emptyHtml() {
  return `
  <div class="shell">
    ${sidebarHtml()}
    <div class="main">
      ${topbarHtml('Меню')}
      <div class="content">
        <div class="page-head">
          <div>
            <span class="kicker">Настройка на меню · стъпка 2 от 4</span>

            <div class="hc"><b>Без снимки засега.</b>Клиентите не виждат менюто — оценяват каквото вече са яли. Само име, категория, цена.</div>

// ============================================================
// AI IMPORT IN PROGRESS
// ============================================================
function aiHtml() {
  // Shows the editor shell with an AI progress banner; 3 rows populated, rest dimmed
  return editingHtml({ aiMode: true });
}

// ============================================================
// EDITING STATE
// ============================================================

const CATEGORIES = [
  { id:'sal', name:'Салати', color:'#7A9B5A' },
  { id:'pred', name:'Предястия', color:'#C24D2C' },
  { id:'sup', name:'Супи', color:'#D98F3E' },
  { id:'osn', name:'Основни', color:'#5B2A2A' },
  { id:'des', name:'Десерти', color:'#B88FA0' },
  { id:'pit', name:'Пиене', color:'#3F6B4E' },
];

const MENU = {
  sal: [
    { n:'Шопска салата', aliases:['ШП','Шопска','шопс'], price:'6,90' },
    { n:'Овчарска салата', aliases:['ОВЧ','овч'], price:'8,50' },
    { n:'Зелена салата', aliases:['ЗЕЛ'], price:'5,20' },
    { n:'Кьопоолу', aliases:[], price:'4,90' },
  ],
  pred: [
    { n:'Тиквички с млечен сос', aliases:['ТИК','тиквички'], price:'6,50' },
    { n:'Кашкавал пане', aliases:['КАШ','каш пане'], price:'7,20' },
    { n:'Пържени чушки', aliases:['ЧУ'], price:'4,80' },
    { n:'Сирене по шопски', aliases:['СШ','сир шоп'], price:'5,50' },
  ],
  sup: [
    { n:'Таратор', aliases:['ТАР'], price:'4,50' },
    { n:'Пилешка супа', aliases:['ПС','пил'], price:'4,20' },
    { n:'Боб чорба', aliases:['БЧ','боб'], price:'4,50' },
  ],
  osn: [
    { n:'Кебапчета с гарнитура', aliases:['КБ','кеб','кеб. гар'], price:'11,90' },
    { n:'Кюфтета пържени', aliases:['КФ','кюф'], price:'10,50' },
    { n:'Пиле с ориз', aliases:['ПО'], price:'12,80' },
    { n:'Мусака по тракийски', aliases:['МУС','мусака'], price:'9,50' },
    { n:'Сач „Механата"', aliases:['САЧ','сач мех'], price:'28,00' },
    { n:'Свински ребра на скара', aliases:['РЕБ','ребра'], price:'18,90' },
    { n:'Риба меча пъстърва', aliases:['РБ','пъст'], price:'22,00' },
  ],
  des: [
    { n:'Баница с орехи', aliases:['БН','баница'], price:'5,50' },
    { n:'Крем карамел', aliases:['КР','крем'], price:'4,80' },
  ],
  pit: [
    { n:'Домашна лимонада', aliases:['ЛИМ'], price:'3,50' },
    { n:'Айрян', aliases:['А'], price:'2,20' },
    { n:'Вино къщата 250мл', aliases:['ВК','вино'], price:'5,80' },
  ],
};

function totalCount() {
  return Object.values(MENU).reduce((s, items) => s + items.length, 0);
}

function categoryPill(catId) {
  const c = CATEGORIES.find(c => c.id === catId);
  return `<button class="cell-cat"><span class="dot" style="background:${c.color}"></span>${c.name}${I.chev}</button>`;
}

function rowHtml(item, catId, isNew) {
  const aliasPills = item.aliases.slice(0,3).map(a => `<span class="alias">${a}</span>`).join('');
  const more = item.aliases.length > 3 ? `<span class="alias">+${item.aliases.length-3}</span>` : '';
  return `
  <div class="trow ${isNew?'new':''}">
    <div class="cell drag">${I.drag}</div>
    <div class="cell"><input class="cell-input name" value="${item.n}" spellcheck="false"/></div>
    <div class="cell">${categoryPill(catId)}</div>
    <div class="cell aliases-c"><div class="aliases">${aliasPills}${more}<button class="alias add">+ абревиатура</button></div></div>
    <div class="cell"><div class="num-box"><input class="cell-input num" value="${item.price}" spellcheck="false"/><span class="currency">лв</span></div></div>
    <div class="cell"><button class="rowmenu" title="Още">${I.dots}</button></div>
  </div>`;
}

function categoryBlock(catId) {
  const c = CATEGORIES.find(c => c.id === catId);
  const items = MENU[catId] || [];
  return `
  <div class="category-block">
    <div class="category-head">
      <h3>${c.name}</h3>
      <span class="tag">${String(items.length).padStart(2,'0')} · ${c.name.toLowerCase()}</span>
      <div class="spacer"></div>
      <button class="collapse">${I.chev} скрий</button>
    </div>
    <div class="table">
      <div class="thead">
        <div class="th"></div>
        <div class="th">Име на ястие</div>
        <div class="th">Категория</div>
        <div class="th aliases-h">Как го пишат на бона <span class="kbd" style="margin-left:4px">?</span></div>
        <div class="th num">Цена</div>
        <div class="th"></div>
      </div>
      ${items.map(it => rowHtml(it, catId, false)).join('')}
      <div class="tadd">
        <button class="add-inline">${I.plus} добави ястие в ${c.name.toLowerCase()}</button>
        <div class="spacer"></div>
        <span class="hint"><span class="kbd">↵</span> нов ред</span>
      </div>
    </div>
  </div>`;
}

function editingHtml(opts = {}) {
  const total = totalCount();
  const aiBanner = opts.aiMode ? `
    <div class="ai-panel">
      <div class="ai-icon">${I.sparkles}</div>
      <div>
        <h4><em>AI</em> чете менюто ти…</h4>
        <p>Разпознах 28 от ~42 ястия. Когато приключа, ще ти маркирам съмнителните с жълто — само тях преглеждаш.</p>
        <div class="prog-row">
          <div class="pb"><i></i></div>
          <span>страница 2 от 3 · меню.pdf</span>
        </div>
      </div>
      <div class="btns">
        <button class="btn btn-ghost">Спри</button>
      </div>
    </div>` : '';

  const categoriesHtml = CATEGORIES
    .filter(c => MENU[c.id] && MENU[c.id].length)
    .map(c => categoryBlock(c.id))
    .join('');

  return `
  <div class="shell">
    ${sidebarHtml()}
    <div class="main">
      ${topbarHtml('Меню')}
      <div class="content">
        <div class="page-head">
          <div>
            <span class="kicker">Настройка на меню · преглед &amp; редакция</span>
            <h1>Преглед на <em>менюто</em>.</h1>
            <p class="lead">Прегледай ястията и поправи грешките. Имената са важни — по тях AI разпознава истината от касовите бележки.</p>
          </div>
          <div class="stat-block">
            <div><span class="n">${total}</span>продукта</div>
            <div><span class="n">${CATEGORIES.filter(c=>MENU[c.id]&&MENU[c.id].length).length}</span>категории</div>
            <div><span class="n" style="color:var(--accent)">3</span>съмнителни</div>
          </div>
        </div>

        ${aiBanner}

        <div class="toolbar">
          <div class="search">
            ${I.search}<input placeholder="Търси ястие или абревиатура…"/>
            <span class="kbd">⌘K</span>
          </div>
          <div class="chips">
            <button class="chip on">Всички <span class="count">${total}</span></button>
            ${CATEGORIES.filter(c=>MENU[c.id]&&MENU[c.id].length).map(c =>
              `<button class="chip"><span class="dot" style="width:6px;height:6px;border-radius:50%;background:${c.color}"></span>${c.name} <span class="count">${MENU[c.id].length}</span></button>`
            ).join('')}
          </div>
          <div class="spacer"></div>
          <button class="tb-btn">${I.plus} Нова категория</button>
          <button class="tb-btn">${I.upload} Импорт</button>
          <button class="tb-btn">${I.download} Експорт</button>
        </div>

        <div class="editor">
          ${categoriesHtml}
        </div>

        <div class="unsaved-bar">
          <span class="dot"></span>
          <div class="msg"><b>Незапазени промени</b> <span>· 3 поправки в „Основни", 1 нова категория</span></div>
          <button class="btn btn-ghost">${I.undo} Отмени</button>
          <button class="btn btn-primary">Запази менюто</button>
        </div>
      </div>
    </div>
  </div>`;
}

function render(state) {
  const stage = document.getElementById('stage');
  if (state === 'empty') stage.innerHTML = emptyHtml();
  else if (state === 'ai') stage.innerHTML = aiHtml();
  else stage.innerHTML = editingHtml({ aiMode: false });
  window.scrollTo({ top: 0 });
}

function go(state) {
  if (state === 'editing-blank') state = 'editing';
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('on', b.dataset.state === state));
  render(state);
}

document.querySelectorAll('#tabs button').forEach(b => {
  b.addEventListener('click', () => go(b.dataset.state));
});
render('empty');
</script>
</body>
</html>
